name: Golang with cache
author: Peter Mescalchin
description: Setup requested Node.js version with managed node_modules directory caching.

inputs:
  node-version:
    description: The desired Node.js version to use.
    default:
  node-version-file:
    description: Read desired Node.js version from file.
    default:
  cache-key-suffix:
    description: Optional cache key suffix.
    default:

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: ${{ inputs.node-version }}
        node-version-file: ${{ inputs.node-version-file }}

